        function trackEvent(actionType, label, customUrl = null) {

        // ==========================================
        // LÓGICA DE CARGA Y PARSEO DEL CSV
        // ==========================================
        function parseCSV(text) {
            const rows = [];
            let currentRow = [];
            let currentCell = '';
            let insideQuotes = false;
            
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (insideQuotes) {
                    if (char === '"' && i + 1 < text.length && text[i + 1] === '"') {
                        currentCell += '"'; i++;
                    } else if (char === '"') {
                        insideQuotes = false;
                    } else {
                        currentCell += char;
                    }
                } else {
                    if (char === '"') insideQuotes = true;
                    else if (char === ',') { currentRow.push(currentCell); currentCell = ''; }
                    else if (char === '\n' || char === '\r') {
                        if (char === '\r' && i + 1 < text.length && text[i + 1] === '\n') i++;
                        currentRow.push(currentCell);
                        if(currentRow.join('').trim() !== '') rows.push(currentRow);
                        currentRow = []; currentCell = '';
                    } else {
                        currentCell += char;
                    }
                }
            }
            if (currentRow.length > 0 || currentCell !== '') {
                currentRow.push(currentCell);
                rows.push(currentRow);
            }
            return rows;
        }

        async function loadBusinesses() {
            let csvText = fallbackCSV;
            
            if(sheetURL !== 'TU_ENLACE_A_GOOGLE_SHEETS_CSV') {

                    if(response.ok) csvText = await response.text();
                } catch(e) {
                    console.warn("Usando base de datos local (Fallback)");
                }
            }
            
            const data = parseCSV(csvText);
            renderItems(data);
            
            // Reaplicar el filtro inicial (Recomendados está activo por defecto en tu HTML original)
            const btnRecomendados = document.querySelector('.filter-btn.active');
            if(btnRecomendados) {
                applyFilter('category', 'recomendados', btnRecomendados);
            }
        }

        function renderItems(rows) {
            const container = document.getElementById('items-container');
            const bannersContainer = document.getElementById('banners-container');
            const bannersWrapper = document.getElementById('banners-wrapper');
            
            container.innerHTML = ''; 
            bannersContainer.innerHTML = ''; 
            
            let bannersCount = 0; // Para saber si ocultamos toda la sección de destacados
            
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i];
                if (cols.length < 2) continue;

                const nombre = cols[0];
                const categoria = cols[1];
                const tipo = cols[2];
                let imagen = cols[3] ? cols[3].trim() : '';
                const badge = cols[4];
                const estado = cols[5];
                const descripcion = cols[6];
                const ubicacion = cols[7];
                const labelWa = cols[8];
                let walink = cols[9] ? cols[9].trim() : ''; // Columna 10: Enlace WA
                const showBanner = cols[10] ? cols[10].trim() : '0'; // Columna 11: Mostrar banner (1 o 0)
                const promoText = cols[11] ? cols[11].trim() : descripcion; // Columna 12: Texto del pop-up

                // --- LIMPIEZA AUTOMÁTICA DE URL DE IMAGEN ---
                // 1. Quitar comillas accidentales que Google Sheets pudiera haber dejado
                imagen = imagen.replace(/^["']+|["']+$/g, '');
                
                // 2. Si la URL se copió como redirección de Google, extraer la original
                if (imagen.includes('google.com/url?')) {
                    const qs = imagen.split('?')[1];
                    if(qs) {
                        const params = new URLSearchParams(qs);
                        if(params.has('q')) imagen = params.get('q');
                        else if(params.has('url')) imagen = params.get('url');
                    }
                } else if (imagen.includes('google.com/search?q=')) {
                    imagen = decodeURIComponent(imagen.split('q=')[1].split('&')[0]);
                }

                // 3. ¡LA CLAVE AQUÍ! Decodificar caracteres como %3F (?) o %3D (=)
                try { imagen = decodeURIComponent(imagen); } catch(e) {}
                
                // 4. Forzar HTTPS para evitar que el navegador las bloquee por seguridad (Mixed Content)
                if (imagen.startsWith('http://')) {
                    imagen = imagen.replace('http://', 'https://');
                }

                // --- LIMPIEZA AUTOMÁTICA DEL WALINK ---
                // Si el enlace de WA vino sucio de Gmail o Google, lo limpiamos para tus agentes
                walink = walink.replace(/^["']+|["']+$/g, '');
                if (walink.includes('google.com/url?')) {
                    const qs = walink.split('?')[1];
                    if(qs) {
                        const params = new URLSearchParams(qs);
                        if(params.has('q')) walink = params.get('q');
                        else if(params.has('url')) walink = params.get('url');
                    }
                }
                try { walink = decodeURIComponent(walink); } catch(e) {}

                let estadoClass = 'bg-gray-100 text-gray-600';

                if(badge) {

                        <i class="fa-solid fa-star"></i> ${badge}
                    </div>`;

                // --- INYECCIÓN DE BANNER DESTACADO (Si ShowBanner es 1) ---
                if (showBanner === '1') {
                    bannersCount++;
                    // Escapamos comillas simples para evitar errores en el evento JS

                    const safePromo = promoText.replace(/'/g, "\\'");

                        <div class="absolute bottom-4 left-4 text-white w-full pr-4">

                // Recreación idéntica a tu <article> original
                const article = document.createElement('article');
                article.className = 'list-item bg-white rounded-[20px] overflow-hidden shadow-sm border border-gray-100';
                article.dataset.category = categoria;
                article.dataset.type = tipo;

                article.innerHTML = `
                    <div class="h-36 overflow-hidden relative">
                        <img src="${imagen}" alt="${nombre}" class="w-full h-full object-cover">
                        ${badgeHTML}
                    </div>
                    <div class="p-4">
                        <div class="flex justify-between items-start mb-1">
                            <h4 class="font-bold text-lg text-gray-900">${nombre}</h4>
                            <span class="${estadoClass} text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wide">${estado}</span>
                        </div>
                        <p class="text-sm text-gray-500 mb-2 leading-relaxed">${descripcion}</p>
                        <div class="flex items-center gap-1.5 text-xs text-gray-500 mb-4 font-medium">
                            <i class="fa-solid fa-location-dot text-suri-main"></i> ${ubicacion}
                        </div>
                        <button onclick="trackEvent('Conversión - WhatsApp', '${labelWa.replace(/'/g, "\\'")}', '${walink}')" class="w-full bg-whatsapp-main hover:bg-whatsapp-hover text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition shadow-sm shadow-green-200">
                            <i class="fa-brands fa-whatsapp text-xl"></i> Contactar por WhatsApp
                        </button>
                    </div>
                `;
                container.appendChild(article);
            }
            
            // Si no hay ningún negocio marcado con 1, ocultamos el carrusel completo de la interfaz
            if(bannersCount === 0) {
                bannersWrapper.style.display = 'none';
            } else {
                bannersWrapper.style.display = 'block';
            }
        }

        // ==========================================
        // LÓGICA DE FILTRADO Y MODALES ORIGINAL
        // ==========================================
        
        function applyFilter(filterType, filterValue, buttonElement, isBottomNav = false) {
            trackEvent('Filtro', `Aplicado: ${filterValue}`);

            if (isBottomNav) {
                document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active', 'text-suri-main'));
                document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.add('text-gray-400'));
                
                buttonElement.classList.remove('text-gray-400');
                buttonElement.classList.add('active', 'text-suri-main');
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            } else {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                buttonElement.classList.add('active');

                document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active', 'text-suri-main'));
                document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.add('text-gray-400'));
            }

            const titleElement = document.getElementById('section-title');
            if (filterValue === 'all') {
                titleElement.innerText = 'Encuentra todo muy cerca de ti';
            } else if (filterType === 'type' && filterValue === 'negocio') {
                titleElement.innerText = 'Negocios cerca a ti';
            } else if (filterType === 'type' && filterValue === 'servicio') {
                titleElement.innerText = 'Servicios Disponibles';
            } else {
                titleElement.innerText = filterValue.charAt(0).toUpperCase() + filterValue.slice(1);
            }

            const items = document.querySelectorAll('.list-item');
            let visibleCount = 0;

            items.forEach(item => {
                let shouldShow = false;
                
                if (filterValue === 'all') {
                    shouldShow = true;
                } else if (filterType === 'category') {
                    // Tu lógica original de filtrado que funciona perfecto con el dataset
                    const categories = item.dataset.category.split(',');
                    if (categories.includes(filterValue)) shouldShow = true;
                } else if (filterType === 'type') {
                    if (item.dataset.type === filterValue) shouldShow = true;
                }

                if (shouldShow) {
                    item.style.display = 'block';
                    visibleCount++;
                } else {
                    item.style.display = 'none';
                }
            });

            const noResults = document.getElementById('no-results');
            if (visibleCount === 0) {
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
            }
        }

        function openModal(title, image, promo, location, labelWa, walink) {
            trackEvent('Pop-up Banner', `Abierto: ${title}`);
            
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-img').src = image;
            document.getElementById('modal-promo').innerText = promo;
            document.getElementById('modal-location').innerText = location;
            
            const waBtn = document.getElementById('modal-wa-btn');
            waBtn.onclick = function() {
                trackEvent('Conversión - WhatsApp (Banner Promo)', labelWa, walink);
            };

            const modal = document.getElementById('promo-modal');
            const modalContent = document.getElementById('promo-modal-content');
            
            modal.classList.remove('hidden');
            
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('promo-modal');
            const modalContent = document.getElementById('promo-modal-content');
            
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // Inicialización
        window.onload = () => {
            trackEvent('Tráfico', 'Visita Inicial al Mini Site');
            loadBusinesses(); // Inicia la carga del CSV
        };

    </script>
</body>
</html>
