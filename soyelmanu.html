        // ==========================================
        // LÓGICA DE CARGA Y PARSEO DEL CSV
        // ==========================================
        function parseCSV(text) {
            const rows = [];
            let currentRow = [];
            let currentCell = '';
            let insideQuotes = false;
            
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (insideQuotes) {
                    if (char === '"' && i + 1 < text.length && text[i + 1] === '"') {
                        currentCell += '"'; i++;
                    } else if (char === '"') {
                        insideQuotes = false;
                    } else {
                        currentCell += char;
                    }
                } else {
                    if (char === '"') insideQuotes = true;
                    else if (char === ',') { currentRow.push(currentCell); currentCell = ''; }
                    else if (char === '\n' || char === '\r') {
                        if (char === '\r' && i + 1 < text.length && text[i + 1] === '\n') i++;
                        currentRow.push(currentCell);
                        if(currentRow.join('').trim() !== '') rows.push(currentRow);
                        currentRow = []; currentCell = '';
                    } else {
                        currentCell += char;
                    }
                }
            }
            if (currentRow.length > 0 || currentCell !== '') {
                currentRow.push(currentCell);
                rows.push(currentRow);
            }
            return rows;
        }

            const data = parseCSV(csvText);
            renderItems(data);
            
            const btnRecomendados = document.querySelector('.filter-btn.active');

                applyFilter('category', 'recomendados', btnRecomendados);
            }

            startAutoScroll();
        }

                const banners = container.children;
                
                // 1. Detección absoluta del borde final:
                // Sumamos el scroll actual + el ancho visible. Si es igual o mayor al ancho total del contenido (con 10px de margen de error), ¡llegamos al final!
                const isAtEnd = container.scrollLeft + container.clientWidth >= container.scrollWidth - 10;
                
                let nextIndex = 0; // Por defecto volvemos al inicio (índice 0)

                // 2. Si NO estamos en el final absoluto, buscamos el siguiente banner normal
                if (!isAtEnd) {
                    const containerCenter = container.scrollLeft + (container.clientWidth / 2);
                    
                    for (let i = 0; i < banners.length; i++) {
                        const bannerCenter = banners[i].offsetLeft + (banners[i].clientWidth / 2);
                        
                        if (bannerCenter > containerCenter + 20) {
                            nextIndex = i;
                            break;
                        }
                    }
                    
                    // Medida de seguridad extra por si el cálculo de centros falla en el último ítem
                    // forzando un reinicio si el "siguiente" que encontró es el mismo en el que ya estamos atascados
                    if (nextIndex === banners.length - 1 && banners[nextIndex].offsetLeft - container.scrollLeft <= 50) {
                        nextIndex = 0;
                    }
                }

                // 3. Ejecutamos el movimiento
                const targetBanner = banners[nextIndex];
                const exactScrollPosition = targetBanner.offsetLeft - (container.clientWidth / 2) + (targetBanner.clientWidth / 2);

                container.scrollTo({
                    left: exactScrollPosition,
                    behavior: 'smooth'
                });

            }, 7000); // 7000 milisegundos = 7 segundos
        }

        function renderItems(rows) {
            const container = document.getElementById('items-container');
            const bannersContainer = document.getElementById('banners-container');
            const bannersWrapper = document.getElementById('banners-wrapper');
            
            container.innerHTML = ''; 
            bannersContainer.innerHTML = ''; 
            
            let bannersCount = 0; 
            
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i];
                if (cols.length < 2) continue;

                const nombre = cols[0];
                const categoria = cols[1];
                const tipo = cols[2];
                let imagen = cols[3] ? cols[3].trim() : '';
                const badge = cols[4];
                const estado = cols[5];
                const descripcion = cols[6];
                const ubicacion = cols[7];
                const labelWa = cols[8];
                let walink = cols[9] ? cols[9].trim() : ''; 
                const showBanner = cols[10] ? cols[10].trim() : '0'; 
                const promoText = cols[11] ? cols[11].trim() : descripcion; 
                const videoIg = cols[12] ? cols[12].trim() : ''; // NUEVA COLUMNA: URL de Instagram
                let precioDesde = cols[13] ? cols[13].trim() : ''; // NUEVA COLUMNA: Precio

                // --- FORMATEO DEL PRECIO EN PESOS COLOMBIANOS ---
                let precioHTML = '';
                if (precioDesde) {
                    // Quitar cualquier caracter que no sea número por si el cliente pone '$' o puntos
                    const precioNumerico = parseInt(precioDesde.replace(/\D/g, ''), 10);
                    if (!isNaN(precioNumerico)) {
                        // Formatear a moneda colombiana (ej. 25000 -> $25.000)
                        const precioFormateado = new Intl.NumberFormat('es-CO', {
                            style: 'currency',
                            currency: 'COP',
                            maximumFractionDigits: 0 // Sin decimales para COP
                        }).format(precioNumerico);
                        
                        precioHTML = `
                        <div class="flex items-center gap-1.5 text-xs text-green-400 mb-5 font-bold">
                            <i class="fa-solid fa-money-bill-wave"></i> Platos desde ${precioFormateado}
                        </div>`;
                    }
                } else {
                     // Si no hay precio, dejamos el margen original inferior de la ubicación
                     precioHTML = `<div class="mb-5"></div>`;
                }

                // --- LIMPIEZA AUTOMÁTICA DE URL DE IMAGEN ---
                imagen = imagen.replace(/^["']+|["']+$/g, '');
                if (imagen.includes('google.com/url?')) {
                    const qs = imagen.split('?')[1];
                    if(qs) {
                        const params = new URLSearchParams(qs);
                        if(params.has('q')) imagen = params.get('q');
                        else if(params.has('url')) imagen = params.get('url');
                    }
                } else if (imagen.includes('google.com/search?q=')) {
                    imagen = decodeURIComponent(imagen.split('q=')[1].split('&')[0]);
                }
                try { imagen = decodeURIComponent(imagen); } catch(e) {}
                if (imagen.startsWith('http://')) {
                    imagen = imagen.replace('http://', 'https://');
                }

                // --- LIMPIEZA AUTOMÁTICA DEL WALINK ---
                walink = walink.replace(/^["']+|["']+$/g, '');
                if (walink.includes('google.com/url?')) {
                    const qs = walink.split('?')[1];
                    if(qs) {
                        const params = new URLSearchParams(qs);
                        if(params.has('q')) walink = params.get('q');
                        else if(params.has('url')) walink = params.get('url');
                    }
                }
                try { walink = decodeURIComponent(walink); } catch(e) {}

                // Lógica de colores de estado (ADAPTADA A MODO OSCURO)
                let estadoClass = 'bg-neutral-800 text-neutral-400 border border-neutral-700';
                const estLower = estado.toLowerCase();
                if(estLower.includes('abierto') || estLower.includes('disponible')) {
                    estadoClass = 'bg-green-500/10 text-green-400 border border-green-500/20';
                } else if (estLower.includes('jueves') || estLower.includes('agenda')) {
                    estadoClass = 'bg-manu-main/10 text-manu-main border border-manu-main/20';
                }

                // Lógica de Badge
                let badgeHTML = '';
                if(badge) {
                    badgeHTML = `
                    <div class="absolute top-3 left-3 bg-manu-main text-black text-[10px] font-black px-2.5 py-1 rounded-md shadow-lg flex items-center gap-1">
                        <i class="fa-solid fa-fire"></i> ${badge}
                    </div>`;
                }

                // --- INYECCIÓN DE BANNER DESTACADO ---
                if (showBanner === '1') {
                    bannersCount++;
                    const safeNombre = nombre.replace(/'/g, "\\'");
                    const safePromo = promoText.replace(/'/g, "\\'");
                    const safeUbicacion = ubicacion.replace(/'/g, "\\'");
                    const safeLabelWa = labelWa.replace(/'/g, "\\'");
                    const safeVideoIg = videoIg.replace(/'/g, "\\'");
                    const safeImagen = imagen.replace(/'/g, "\\'"); // Escapamos por seguridad
                    const safeWalink = walink.replace(/'/g, "\\'"); // Escapamos por seguridad
                    
                    const bannerHTML = `
                    <div onclick="openModal('${safeNombre}', '${safeImagen}', '${safePromo}', '${safeUbicacion}', '${safeLabelWa}', '${safeWalink}', '${safeVideoIg}')" class="snap-center shrink-0 w-64 h-36 rounded-2xl relative overflow-hidden bg-neutral-900 border border-neutral-800 shadow-lg cursor-pointer transition hover:opacity-90">
                        <img src="${imagen}" alt="${nombre}" class="absolute inset-0 w-full h-full object-cover opacity-60">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"></div>
                        <div class="absolute bottom-4 left-4 text-white w-full pr-4">
                            <h2 class="text-xl font-bold leading-tight">${nombre}</h2>
                            <p class="text-xs text-manu-main font-semibold mt-1">Ver promoción →</p>
                        </div>
                    </div>`;
                    bannersContainer.innerHTML += bannerHTML;
                }

                // Recreación del <article> adaptada al modo oscuro
                const article = document.createElement('article');
                article.className = 'list-item bg-neutral-900 rounded-[20px] overflow-hidden shadow-md border border-neutral-800';
                article.dataset.category = categoria;
                article.dataset.type = tipo;

                // Modifiqué el HTML para incluir el precio debajo de la ubicación
                article.innerHTML = `
                    <div class="h-44 overflow-hidden relative">
                        <img src="${imagen}" alt="${nombre}" class="w-full h-full object-cover">
                        ${badgeHTML}
                    </div>
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="font-bold text-lg text-white">${nombre}</h4>
                            <span class="${estadoClass} text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wide whitespace-nowrap">${estado}</span>
                        </div>
                        <p class="text-sm text-neutral-400 mb-3 leading-relaxed">${descripcion}</p>
                        <div class="flex items-center gap-1.5 text-xs text-neutral-500 font-medium ${precioDesde ? 'mb-1' : 'mb-5'}">
                            <i class="fa-solid fa-location-dot text-manu-dark"></i> ${ubicacion}
                        </div>
                        ${precioHTML}
                        <button onclick="trackEvent('Conversión - WhatsApp', '${labelWa.replace(/'/g, "\\'")}', '${walink}')" class="w-full bg-whatsapp-main hover:bg-whatsapp-hover text-neutral-950 font-black py-3 rounded-xl flex items-center justify-center gap-2 transition shadow-[0_0_10px_rgba(37,211,102,0.2)]">
                            <i class="fa-brands fa-whatsapp text-xl"></i> Pedir por WhatsApp
                        </button>
                    </div>
                `;
                container.appendChild(article);
            }
            
            if(bannersCount === 0) {
                bannersWrapper.style.display = 'none';
            } else {
                bannersWrapper.style.display = 'block';
            }
        }

        // ==========================================
        // LÓGICA DE FILTRADO Y MODALES ORIGINAL
        // ==========================================
        
        function applyFilter(filterType, filterValue, buttonElement, isBottomNav = false) {
            trackEvent('Filtro', `Aplicado: ${filterValue}`);

            if (isBottomNav) {
                document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active', 'text-white'));
                document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.add('text-neutral-400'));
                
                buttonElement.classList.remove('text-neutral-400');
                buttonElement.classList.add('active', 'text-white');
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            } else {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                buttonElement.classList.add('active');

                document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active', 'text-white'));
                document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.add('text-neutral-400'));
            }

            const titleElement = document.getElementById('section-title');
            if (filterValue === 'all') {
                titleElement.innerText = 'El menú de la casa';
            } else if (filterType === 'type' && filterValue === 'menu') {
                titleElement.innerText = 'Nuestro Menú';
            } else if (filterType === 'type' && filterValue === 'merch') {
                titleElement.innerText = 'Merch Oficial';
            } else {
                titleElement.innerText = filterValue.charAt(0).toUpperCase() + filterValue.slice(1);
            }

            const items = document.querySelectorAll('.list-item');
            let visibleCount = 0;

            items.forEach(item => {
                let shouldShow = false;
                
                if (filterValue === 'all') {
                    shouldShow = true;
                } else if (filterType === 'category') {
                    const categories = item.dataset.category.split(',');
                    if (categories.includes(filterValue)) shouldShow = true;
                } else if (filterType === 'type') {
                    if (item.dataset.type === filterValue) shouldShow = true;
                }

                if (shouldShow) {
                    item.style.display = 'block';
                    visibleCount++;
                } else {
                    item.style.display = 'none';
                }
            });

            const noResults = document.getElementById('no-results');
            if (visibleCount === 0) {
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
            }
        }

        function openModal(title, image, promo, location, labelWa, walink, videoIg = '') {
            trackEvent('Pop-up Banner', `Abierto: ${title}`);
            
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-promo').innerText = promo;
            document.getElementById('modal-location').innerText = location;
            
            const imgEl = document.getElementById('modal-img');
            const vidEl = document.getElementById('modal-video');

            // Lógica para mostrar Video de Instagram o Imagen (Mejorada)
            if (videoIg && (videoIg.includes('instagram.com') || videoIg.includes('instagr.am'))) {
                // Forzar formato /embed limpio quitando parámetros (ej. ?igsh=...)
                let embedUrl = videoIg.split('?')[0]; 
                embedUrl = embedUrl.replace(/\/+$/, ''); // Quita diagonales extra al final
                embedUrl += '/embed'; // Agrega /embed limpio requerido por el Iframe
                
                imgEl.classList.add('hidden');
                vidEl.classList.remove('hidden');
                vidEl.src = embedUrl;
            } else {
                vidEl.classList.add('hidden');
                vidEl.src = '';
                imgEl.classList.remove('hidden');
                imgEl.src = image;
            }
            
            const waBtn = document.getElementById('modal-wa-btn');
            waBtn.onclick = function() {
                trackEvent('Conversión - WhatsApp (Banner Promo)', labelWa, walink);
            };

            const modal = document.getElementById('promo-modal');
            const modalContent = document.getElementById('promo-modal-content');
            
            modal.classList.remove('hidden');
            
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('promo-modal');
            const modalContent = document.getElementById('promo-modal-content');
            
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                document.getElementById('modal-video').src = ''; // Detener video al cerrar
            }, 300);
        }

        // Inicialización
        window.onload = () => {
            trackEvent('Tráfico', 'Visita Inicial App Manu');
            loadBusinesses();
        };

    </script>
